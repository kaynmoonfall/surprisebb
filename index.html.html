<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pour toi chellam...</title>
    <style>
        body {
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            transition: background 0.4s ease;
            position: relative;
        }

        /* Lignes de vitesse (Effet Dash Jett) */
        .speed-line {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            width: 3px;
            height: 100px;
            pointer-events: none;
            z-index: 10;
        }

        /* Le Notebook Carré */
        #sheet {
            position: absolute;
            background-color: #fdf6e3; /* Beige papier */
            background-image: 
                linear-gradient(90deg, transparent 39px, #ab8d77 39px, #ab8d77 41px, transparent 41px), /* Ligne verticale */
                linear-gradient(#e1e1e1 1px, transparent 1px); /* Lignes horizontales */
            background-size: 100% 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 20px 20px 55px;
            box-sizing: border-box;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.15, 0.85, 0.35, 1.2);
            user-select: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid #dcdcdc;
            z-index: 5;
            width: 250px; /* Taille fixe carrée */
            height: 250px;
        }

        #message {
            font-size: 1.05rem;
            color: #2c3e50;
            font-weight: bold;
            pointer-events: none;
            word-wrap: break-word;
        }

        .active-click {
            transform: scale(0.8) !important;
        }

        .heart {
            font-size: 2.5rem;
            display: block;
            color: #e74c3c;
            animation: beat 0.6s infinite alternate;
        }
        @keyframes beat { to { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div id="sheet">
        <div id="message">Hi chellam j'ai un petit qqchose pour toi, ouvre moi</div>
    </div>

    <script>
        let clicks = 0;
        const sheet = document.getElementById('sheet');
        const text = document.getElementById('message');
        const body = document.body;

        const messages = [
            "Oups encore pattu kuttyyy",
            "nan nan nan toujours pas",
            "Hmmm le prochain maybe ?",
            "héhé je t'ai encore eu, c'est le vrai lui maintenant vas-y !",
            "oh non c'est parti où ????",
            "baby baby ohhhh",
            "mais ouvre moiii j'attendss là",
            "maan kuttiyeee",
            "pulli maan kuttiyeee",
            "c'est bon pardon j'arrete",
            "ou PAS behhhh",
            "chérie en faite ce que je voulais te dire c'est ça :",
            "?? ?????? ?",
            "oula ya eu un beug ?",
            "alo la terre ? ici la lune",
            "Mais bordel laissez ma femme voir mon messageeeee",
            "Un deux un deux vous me recevez ?",
            "AHH c bon ca marche",
            "je crois ?",
            "JE RIGOLEEEE",
            "Okok pardon je t'ai enervé mais c'est la dernière",
            "ou pas ?",
            "HAHAHAHHA naan je rigole",
            "allez tiensss :"
        ];

        const finalMessage = "JE T'AIME MA FEMME, MA REINE, MON AMOUR, MA VIE ENTIERE. Je suis amoureux de toi + que tout je veux te marier et avoir des enfants avec toi et vivre heureux jusqu'a la fin de ma vie ❤️";

        const gradients = ["#ff9a9e", "#a1c4fd", "#fccb90", "#84fab0", "#e2ebf0", "#f093fb", "#d4fc79"];

        function createSpeedLines() {
            for (let i = 0; i < 12; i++) {
                const line = document.createElement('div');
                line.className = 'speed-line';
                const angle = Math.random() * Math.PI * 2;
                const dist = 40 + Math.random() * 120;
                line.style.left = '50%';
                line.style.top = '50%';
                line.style.transform = `translate(-50%, -50%) rotate(${angle}rad) translateY(-${dist}px)`;
                body.appendChild(line);
                line.animate([
                    { opacity: 0, height: '0px' },
                    { opacity: 1, height: '120px' },
                    { opacity: 0, height: '180px' }
                ], { duration: 300 });
                setTimeout(() => line.remove(), 300);
            }
        }

        function moveSheet() {
            const size = 250; // On garde le carré
            const maxX = window.innerWidth - size;
            const maxY = window.innerHeight - size;
            const x = Math.max(0, Math.floor(Math.random() * maxX));
            const y = Math.max(0, Math.floor(Math.random() * maxY));

            sheet.style.top = y + "px";
            sheet.style.left = x + "px";
            sheet.style.transform = `rotate(${(Math.random() - 0.5) * 20}deg)`;
        }

        sheet.addEventListener('click', () => {
            createSpeedLines();
            sheet.classList.add('active-click');
            setTimeout(() => sheet.classList.remove('active-click'), 100);

            if (clicks < messages.length) {
                text.innerText = messages[clicks];
                body.style.background = gradients[clicks % gradients.length];
                moveSheet();
                clicks++;
            } else {
                // LE GRAND FINAL
                body.style.background = "linear-gradient(135deg, #ff0844 0%, #ffb199 100%)";
                sheet.style.width = "90vw";
                sheet.style.height = "auto";
                sheet.style.minHeight = "250px";
                sheet.style.top = "50%";
                sheet.style.left = "50%";
                sheet.style.transform = "translate(-50%, -50%)";
                sheet.style.borderRadius = "15px";
                text.innerHTML = `<span class="heart">❤️</span>${finalMessage}`;
                sheet.onclick = null;
            }
        });
    </script>
</body>
</html>
